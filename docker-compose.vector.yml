# Milvus 2.5 standalone stack for hybrid retrieval (dense + BM25 sparse).
# Persisted outside the project tree at /home/ygwang/crawl_data/milvus_data
# so backups sit next to the PDF archive.
#
# Usage:
#   docker compose -f docker-compose.vector.yml up -d
#   docker compose -f docker-compose.vector.yml logs -f milvus
#   docker compose -f docker-compose.vector.yml down
#
# Ports exposed to server-yaojinghe only (bind 127.0.0.1 for Milvus grpc):
#   19530  Milvus gRPC (internal)
#   9091   Milvus metrics + health
#   (MinIO console not exposed — only reachable inside compose network)
#
# Milvus 2.5.x is required for built-in BM25 Function API
# (the 2.4 line only supports raw sparse vectors, not auto BM25).

services:
  etcd:
    # docker.1ms.run has no coreos/etcd mirror; use quay.io direct (already cached locally).
    image: quay.io/coreos/etcd:v3.5.14
    container_name: ta-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - /home/ygwang/crawl_data/milvus_data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: docker.1ms.run/minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: ta-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    # No host ports: minio console is only reachable from inside the compose
    # network. Milvus talks to minio via the bridge hostname. Ports 9000-9004
    # are used by other services on this host.
    volumes:
      - /home/ygwang/crawl_data/milvus_data/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: docker.1ms.run/milvusdb/milvus:v2.5.12
    container_name: ta-milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - /home/ygwang/crawl_data/milvus_data/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    depends_on:
      - etcd
      - minio
