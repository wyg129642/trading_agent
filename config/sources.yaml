# ============================================================
# Trading Agent - Source Definitions
# ============================================================
# To add a new source: copy an existing entry and modify.
# Types: "rss", "web_scraper", "api"
# Priority: "p0" (1min), "p1" (5min), "p2" (10min), "p3" (30min)
# Category: used for UI grouping and user subscription filtering
#
# Categories:
#   ai_technology       — AI companies, tech blogs, AI research
#   semiconductors      — Chip companies, foundries, EDA
#   financial_news      — Wire services, financial media, market news
#   central_banks       — Federal Reserve, ECB, BOE, BOJ, RBA
#   macro_economics     — Jobs data, GDP, CPI, economic indicators
#   commodities_energy  — Oil, gold, metals, agriculture, energy
#   regulatory          — Government policy, trade, export controls
#   pharma_healthcare   — FDA, drug approvals, biotech
#   china_news          — Chinese trending/hot news aggregators
#   exchanges           — Stock/futures exchanges, CME, LME
#   geopolitics         — International relations, sanctions, trade wars
#
# For web_scraper type:
#   - css_selector: CSS selector for the announcement list container
#   - item_selector: CSS selector for individual items within the container
#   - title_selector: CSS selector for the title within each item
#   - link_selector: CSS selector for the link within each item
#   - date_selector: (optional) CSS selector for date within each item
#
# For rss type:
#   - url: RSS/Atom feed URL
#
# For api type:
#   - api_type: specific API handler ("sec_edgar", "federal_register", "sse", "szse", "hotnews")
# ============================================================

