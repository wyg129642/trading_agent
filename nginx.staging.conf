# ============================================================
# Trading Agent — Staging reverse-proxy (OPTIONAL)
# ============================================================
#
# The staging deployment does NOT require nginx by default: uvicorn on
# :20301 serves both /api, /ws, and the React SPA (see main.py SPA
# catch-all). This file exists as an optional drop-in when you later
# want one of:
#
#   * HTTPS termination (add `listen 20301 ssl;` + cert paths)
#   * HTTP basic auth (add `auth_basic "staging";` + htpasswd)
#   * static asset caching independent from uvicorn
#
# Install:
#   sudo cp nginx.staging.conf /etc/nginx/conf.d/ta_staging.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then move uvicorn off :20301 (e.g. APP_PORT=20300 in .env.staging) so
# nginx can bind :20301 publicly without a port collision.
# ============================================================

upstream ta_staging_backend {
    # Point at whatever port uvicorn is bound to — if you enable nginx
    # in front of staging, flip APP_PORT to 20300 (or any private port)
    # and keep :20301 for nginx.
    server 127.0.0.1:20300;
}

server {
    listen 20301;
    server_name _;

    # Staging has no size-sensitive uploads beyond the personal-KB audio
    # cap (500 MB), same as prod. Stay in sync.
    client_max_body_size 600M;

    # API → uvicorn
    location /api/ {
        proxy_pass http://ta_staging_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE chat can stream for 2-5 min — buffering must be off and
        # timeouts long enough to outlive the longest tool loop.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # WebSocket → uvicorn (crawler dashboard push, /ws/feed, CDP screencast)
    location /ws/ {
        proxy_pass http://ta_staging_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /docs        { proxy_pass http://ta_staging_backend; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://ta_staging_backend; proxy_set_header Host $host; }

    # Static SPA bundle — let uvicorn serve it (it picks dist-staging
    # automatically via APP_ENV). Add a `root /path/to/frontend/dist-staging;`
    # here if you want nginx to serve directly and skip uvicorn's mount.
    location / {
        proxy_pass http://ta_staging_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
