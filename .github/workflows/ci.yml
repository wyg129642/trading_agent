name: CI

on:
  push:
    branches: [staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + alembic check)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trading_agent
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: trading_agent
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U trading_agent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio asyncpg alembic psycopg2-binary

      - name: Write .env for CI
        run: |
          cat > .env <<EOF
          APP_ENV=production
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          POSTGRES_DB=trading_agent
          POSTGRES_USER=trading_agent
          POSTGRES_PASSWORD=ci_password
          REDIS_HOST=localhost
          REDIS_PORT=6379
          JWT_SECRET_KEY=ci_test_secret_min_32_chars_xxxxxxx
          LLM_API_KEY=ci_dummy
          EOF

      - name: Alembic upgrade head (schema sanity)
        run: PYTHONPATH=. alembic -c backend/alembic.ini upgrade head

      - name: Alembic — no auto-generated drift
        run: |
          # Placeholder: full drift check needs models imported. We at least
          # assert that the migration tree is linear (single head).
          heads=$(PYTHONPATH=. alembic -c backend/alembic.ini heads | grep -c "(head)" || true)
          if [ "$heads" -gt 1 ]; then
            echo "::error::Alembic has $heads heads — migration tree has diverged."
            PYTHONPATH=. alembic -c backend/alembic.ini heads
            exit 1
          fi

      - name: Run pytest
        # -x stops on first failure; --ignore tests that need real Milvus/Mongo/LLM.
        # Integration-flavored tests are tagged by filename prefix 'test_*_integration.py'
        # and skipped in CI. Unit tests run.
        run: |
          PYTHONPATH=. pytest backend/tests -x \
            --ignore=backend/tests/test_kb_service_integration.py \
            --ignore=backend/tests/test_chat_memory_api.py \
            --ignore=backend/tests/test_user_kb_api.py \
            --ignore=backend/tests/test_revenue_modeling_e2e.py \
            --ignore=backend/tests/test_revenue_modeling_phase6.py \
            -q || pytest_rc=$?
          # Allow tests that depend on external services (Milvus/Mongo/LLM)
          # to be skipped without failing CI — pytest exit 5 = no tests collected.
          if [ "${pytest_rc:-0}" -eq 5 ]; then exit 0; fi
          exit ${pytest_rc:-0}

  frontend:
    name: Frontend (build prod + staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check + prod build
        run: npm run build

      - name: Staging build
        run: npm run build:staging
