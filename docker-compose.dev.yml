version: "3.8"

# Development overrides: only PostgreSQL + Redis (backend/frontend run locally)
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: docker.1ms.run/library/postgres:16-alpine
    container_name: ta-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_agent}
      POSTGRES_USER: ${POSTGRES_USER:-trading_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_pg_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_agent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: ta-redis-dev
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Crawler-data MongoDB (migrated from remote 192.168.31.176:35002 on 2026-04-26).
  # Holds the 10 crawler/user-kb DBs. Bound to 127.0.0.1 only (LAN-internal),
  # no auth (parity with the open remote setup we are replacing).
  mongo-crawl:
    image: docker.1ms.run/library/mongo:7
    container_name: ta-mongo-crawl
    command: ["mongod", "--bind_ip_all", "--wiredTigerCacheSizeGB", "8"]
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - /home/ygwang/crawl_data/mongo:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
